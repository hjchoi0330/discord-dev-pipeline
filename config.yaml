discord:
  # Bot token (use DISCORD_BOT_TOKEN env var instead of hardcoding)
  token: ""

collector:
  # Data storage directory (default: data/conversations, overridable via DATA_DIR env var)
  data_dir: "data/conversations"

  # Whisper speech transcription settings
  whisper_model: "small"       # tiny | base | small | medium | large-v3
  whisper_language: "ko"       # transcription language (ko, en, ja, zh ...)
  whisper_device: "cpu"        # cpu | cuda (GPU acceleration)
  whisper_compute_type: "int8" # int8 | float16 | float32

  # Auto-run pipeline after voice session ends (!leave triggers pipeline automatically)
  auto_pipeline: false

  # Bot pipeline execution mode
  #   "full" = analyze -> plan -> execute (full pipeline)
  #   "plan" = analyze -> plan only (skips execution, for manual review)
  pipeline_mode: "full"

  # Voice channel filter (empty list = all channels)
  monitored_voice_channels: []
  ignored_voice_channels:
    - "AFK"

pipeline:
  data_dir: "data"
  auto_execute: false  # if true, auto-run Claude Code on new plans

executor:
  claude_cli_path: "claude"  # path to claude CLI binary
  timeout_seconds: 300
